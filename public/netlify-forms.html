<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms</title>
</head>
<body>
    <!-- Hidden Form for Netlify Bots -->
    <form name="roadmap" method="POST" action="/netlify-forms.html" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="text" name="mission" />
        <input type="text" name="friction" />
        <input type="text" name="timeline" />
        <input type="text" name="investment" />
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="text" name="website" />
    </form>
</body>
</html>
